version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: koby-db
    restart: always
    environment:
      POSTGRES_USER: koby
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: kobydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  koby:
    container_name: koby-bot
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    working_dir: /app
    depends_on:
      - postgres
    volumes:
      - ./config:/app/config
    env_file:
      - .env
    command: ["npm", "run", "start_migrate"]
    ports:
      - "5555:5555"

volumes:
  postgres_data:
